name: دانلودر تیک‌تاک پیشرفته

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'لینک ویدیوی تیک‌تاک (تک ویدیو یا پروفایل)'
        required: true
        type: string

      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - mp4 (ویدیو با صدا)
          - mp3 (فقط صدا)
        default: 'mp4 (ویدیو با صدا)'

      remove_watermark:
        description: 'حذف واترمارک تیک‌تاک؟'
        required: false
        type: boolean
        default: true

      audio_quality:
        description: 'کیفیت صدا (فقط برای mp3)'
        required: false
        type: choice
        options:
          - '320'
          - '192'
          - '128'
          - '64'
        default: '192'

      download_all_from_profile:
        description: 'دانلود تمام ویدیوهای پروفایل؟'
        required: false
        type: boolean
        default: false

      max_count:
        description: 'حداکثر تعداد ویدیو برای دانلود (در صورت انتخاب پروفایل)'
        required: false
        type: number
        default: 10

      output_folder:
        description: 'پوشه ذخیره فایل‌ها'
        required: false
        type: string
        default: 'tiktok_downloads'

permissions:
  contents: write

jobs:
  download-tiktok:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install -q -U yt-dlp

      - name: Download TikTok video(s)
        run: |
          URL="${{ github.event.inputs.video_url }}"
          FORMAT_TYPE="${{ github.event.inputs.output_format }}"
          REMOVE_WATERMARK="${{ github.event.inputs.remove_watermark }}"
          AUDIO_Q="${{ github.event.inputs.audio_quality }}"
          DOWNLOAD_ALL="${{ github.event.inputs.download_all_from_profile }}"
          MAX_COUNT="${{ github.event.inputs.max_count }}"
          OUTPUT_FOLDER="${{ github.event.inputs.output_folder }}"

          mkdir -p "$OUTPUT_FOLDER"

          # تنظیم فرمت براساس نوع خروجی
          if [ "$FORMAT_TYPE" = "mp3 (فقط صدا)" ]; then
            FORMAT_ARGS="-x --audio-format mp3 --audio-quality ${AUDIO_Q}K"
          else
            if [ "$REMOVE_WATERMARK" = "true" ]; then
              FORMAT_ARGS="-f bestvideo+bestaudio --merge-output-format mp4"
            else
              FORMAT_ARGS="-f best --merge-output-format mp4"
            fi
          fi

          # تنظیم برای پروفایل یا تک ویدیو
          if [ "$DOWNLOAD_ALL" = "true" ]; then
            PLAYLIST_ARGS="--playlist-end ${MAX_COUNT}"
          else
            PLAYLIST_ARGS="--no-playlist"
          fi

          # دانلود با yt-dlp
          yt-dlp \
            --newline \
            --no-mtime \
            $FORMAT_ARGS \
            $PLAYLIST_ARGS \
            --extractor-args "tiktok:embed_logger" \
            -o "$OUTPUT_FOLDER/%(uploader)s - %(title)s [%(id)s].%(ext)s" \
            "$URL"

      - name: Show downloaded files
        run: |
          echo "✅ فایل‌های دانلود شده:"
          ls -la "${{ github.event.inputs.output_folder }}/"

      - name: Push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ github.event.inputs.output_folder }}/"
          git commit -m "دانلود ویدیو از تیک‌تاک [skip ci]" || echo "هیچ فایل جدیدی اضافه نشد"
          git push
