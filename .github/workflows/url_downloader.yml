name: استخراج لینک ویدیوهای تیک‌تاک

on:
  workflow_dispatch:
    inputs:
      tiktok_username:
        description: 'اسم پیج تیک‌تاک (مثل: @cristiano)'
        required: true
        type: string
      
      video_count:
        description: 'تعداد ویدیوهای آخر برای گرفتن لینک'
        required: false
        type: number
        default: 10

permissions:
  contents: write

jobs:
  extract-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yt-dlp
        run: |
          pip install -q -U yt-dlp

      - name: Extract TikTok video links
        run: |
          USERNAME="${{ github.event.inputs.tiktok_username }}"
          COUNT="${{ github.event.inputs.video_count }}"
          
          # حذف @ از اول اسم اگه باشه
          USERNAME_CLEAN=$(echo "$USERNAME" | sed 's/^@//')
          
          # ساخت پوشه به اسم کاربر
          OUTPUT_DIR="tiktok_links/${USERNAME_CLEAN}"
          mkdir -p "$OUTPUT_DIR"
          
          # ساخت لینک کامل پروفایل
          PROFILE_URL="https://www.tiktok.com/@${USERNAME_CLEAN}"
          
          echo "در حال گرفتن لینک ویدیوهای ${USERNAME_CLEAN}..."
          
          # استخراج لینک ویدیوها با yt-dlp
          yt-dlp \
            --flat-playlist \
            --print "%(webpage_url)s" \
            --playlist-end "${COUNT}" \
            "$PROFILE_URL" > "${OUTPUT_DIR}/links.txt"
          
          # نمایش تعداد لینک‌های گرفته شده
          LINK_COUNT=$(wc -l < "${OUTPUT_DIR}/links.txt")
          echo "✅ ${LINK_COUNT} لینک ویدیو استخراج شد"
          
          # اضافه کردن هدر به فایل
          sed -i "1i# لینک‌های ویدیوهای پیج ${USERNAME_CLEAN}\n# تعداد: ${LINK_COUNT}\n# تاریخ: $(date)\n" "${OUTPUT_DIR}/links.txt"
          
          echo "📁 فایل در مسیر ${OUTPUT_DIR}/links.txt ذخیره شد"

      - name: Show extracted links
        run: |
          USERNAME_CLEAN=$(echo "${{ github.event.inputs.tiktok_username }}" | sed 's/^@//')
          echo "محتوای فایل:"
          cat "tiktok_links/${USERNAME_CLEAN}/links.txt"

      - name: Push to repository
        run: |
          USERNAME_CLEAN=$(echo "${{ github.event.inputs.tiktok_username }}" | sed 's/^@//')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "tiktok_links/"
          git commit -m "Add TikTok links for ${USERNAME_CLEAN} [skip ci]" || echo "Nothing to commit"
          git push
